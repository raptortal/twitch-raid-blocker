<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>КОТИКС БЛОЧИТ</title>
  <style>
    body {
      width: 280px;
      padding: 12px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0e0e10;
      color: #efeff1;
      margin: 0;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 12px 0;
      text-align: center;
      color: #9147ff;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      padding: 8px;
      background: #1f1f23;
      border-radius: 6px;
    }
    .row label {
      font-size: 13px;
      cursor: pointer;
    }
    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 22px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #555;
      border-radius: 22px;
      transition: 0.3s;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 2px;
      bottom: 2px;
      background-color: white;
      border-radius: 50%;
      transition: 0.3s;
    }
    input:checked + .slider {
      background-color: #f8a0a7;
    }
    input:checked + .slider:before {
      transform: translateX(18px);
    }
    .counter {
      font-size: 14px;
      font-weight: bold;
    }
    .counter span {
      color: #9147ff;
      font-size: 18px;
      margin-left: 4px;
    }
    button {
      width: 100%;
      padding: 8px;
      margin-top: 8px;
      background: #9147ff;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #772ce8;
    }
    .status {
      font-size: 12px;
      color: #adadb8;
      margin-top: 4px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>🐱 КОТИКС БЛОЧИТ</h1>
  
  <div class="row">
    <label for="toggleSwitch">Включить блокировку</label>
    <label class="switch">
      <input type="checkbox" id="toggleSwitch">
      <span class="slider"></span>
    </label>
  </div>
  
  <div class="status" id="statusText">Статус: ON</div>
  
  <div class="row counter">
    RAID BLOCK: <span id="counterValue">0</span>
  </div>
  
  <button id="clearBtn">🗑️ Сбросить счётчик</button>

  <script src="popup.js"></script>
</body>
</html>
